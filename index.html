<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speakori</title>
  <meta name="description" content="Speakori" />
  <style>
    :root { --fg:#111; --muted:#444; --border:#e7e7e7; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; color: var(--fg); }
    main { max-width: 920px; margin: 0 auto; padding: 72px 20px; }
    h1 { font-size: 52px; margin: 0 0 12px; letter-spacing: -0.02em; }
    p { font-size: 18px; line-height: 1.6; color: var(--muted); margin: 0 0 14px; }
    .card { margin-top: 26px; padding: 18px 18px; border: 1px solid var(--border); border-radius: 14px; }
    a { color: inherit; }
    small { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Speakori</h1>
    <p>Coming soon.</p>

    <div class="card">
      <p><strong>Security contact:</strong> <a href="mailto:security@speakori.com">security@speakori.com</a></p>
      <small>This address is for vulnerability reports and security issues.</small>
    </div>
  </main>
</body>
</html>
